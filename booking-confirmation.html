<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed – Neuracare</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><div class="nav-logo-icon"><i class="fas fa-stethoscope"></i></div>Neuracare</a>
      <div class="nav-menu" id="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="symptom-checker.html" class="nav-link">Symptom Checker</a>
        <a href="find-doctors.html" class="nav-link">Find Doctors</a>
        <a href="my-bookings.html" class="nav-link">My Bookings</a>
        <a href="health-library.html" class="nav-link">Health Library</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </div>
      <div class="nav-actions">
        <div id="nav-get-started" style="display:flex;"><a href="signup.html" class="nav-cta">Get Started</a></div>
        <div id="nav-avatar-wrap" class="nav-avatar-wrap" style="display:none;align-items:center;gap:8px;">
          <button id="nav-avatar-btn" class="nav-avatar-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Account menu"><span id="nav-user-initial" class="nav-user-initial">U</span></button>
          <div id="nav-avatar-dropdown" class="nav-avatar-dropdown"><a href="profile.html">Profile</a><a href="my-bookings.html">My Bookings</a><a href="#" id="nav-logout">Logout</a></div>
        </div>
        <button type="button" class="nav-dark-toggle" id="dark-mode-toggle" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
    </div>
  </nav>

  <main class="page-main">
    <section class="auth-section">
      <div class="container">
        <div class="glass-card" style="max-width:520px;margin:0 auto;padding:48px;text-align:center;">
          <div style="font-size:64px;color:var(--green);margin-bottom:16px;" aria-hidden="true"><i class="fas fa-check-circle"></i></div>
          <h1>Appointment confirmed</h1>
          <p class="confirmation-details" id="confirmation-details" style="text-align:left;margin:24px 0;padding:20px;background:var(--bg-page);border-radius:var(--radius-md);"></p>
          <p style="color:var(--text-secondary);margin-bottom:24px;">A confirmation has been sent to your email.</p>
          <a href="my-bookings.html" class="btn btn-primary btn-large"><i class="fas fa-calendar-check"></i> View My Bookings</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom"><p>© 2026 Neuracare Inc.</p></div>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/dark-mode.js"></script>
  <script>
    try {
      var b = JSON.parse(sessionStorage.getItem('neuracare_last_booking') || '{}');
      var el = document.getElementById('confirmation-details');
      if (el && b.doctorName) {
        el.innerHTML = '<strong>' + b.doctorName + '</strong><br>Date: ' + (b.date || '') + ' at ' + (b.time || '') + '<br>Reason: ' + (b.reason || '—');
      } else {
        el.textContent = 'Booking details not found. Check My Bookings for your appointments.';
      }
    } catch (e) {}
    document.querySelector('.nav-toggle').addEventListener('click', function() { document.getElementById('nav-menu').classList.toggle('open'); });
  </script>
</body>
</html>
